name: Deploy ERP to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "apps/tulie_erp/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: apps/tulie_erp

      - name: Build
        run: npm run build
        working-directory: apps/tulie_erp

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          cd apps/tulie_erp
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ERP_PROJECT_LINK }}
