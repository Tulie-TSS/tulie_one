name: Deploy Workspace to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "apps/tulie_workspace/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: |
          cd apps/tulie_workspace
          NEXT_TELEMETRY_DISABLED=1 npx next build

      - name: Deploy to Vercel
        run: |
          cd apps/tulie_workspace
          npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --project-name=tulie-workspace
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
