name: Deploy CRM to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "apps/tulie_crm/**"
      - "packages/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx turbo run build --filter=tulie_crm

      - name: Deploy to Vercel
        run: |
          cd apps/tulie_crm
          npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
